<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Accounts Console - Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>User Account Management</h1>
            <p>Admin settings control console</p>
        </header>

        <div class="card">
            <h2>➕ Add or Modify Account Node</h2>
            <form action="/manage_users" method="post">
                <div class="form-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" placeholder="Enter username..." required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" placeholder="Enter password..." required>
                </div>
                
                <div class="form-group" style="display: flex; align-items: center; justify-content: flex-start; margin-bottom: 25px;">
                    <input type="checkbox" id="show_password_toggle">
                    <label for="show_password_toggle" style="margin-bottom: 0; cursor: pointer; user-select: none;">Show password</label>
                </div>
                
                <div class="form-group">
                    <label for="role">Assigned Access Level:</label>
                    <select id="role" name="role" required>
                        <option value="faculty">Faculty Member</option>
                        <option value="admin">Administrator Node</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="name">Operator Display Name (Optional):</label>
                    <input type="text" id="name" name="name" placeholder="Enter operator name...">
                </div>
                
                <button type="submit" class="btn" style="width: 100%; margin: 15px 0 0 0;">➕ Commit Settings</button>
            </form>
        </div>

        <div class="card">
            <h2>👥 Registered User Identities</h2>
            <ul class="user-list">
                {% for uname, info in users.items() %}
                <li>
                    <div>
                        <strong>{{ uname }}</strong> 
                        <span style="color: #64748b; margin-left: 10px; font-size: 0.95rem;">({{ info.name or 'Unnamed Operator' }})</span>
                    </div>
                    <span class="{% if info.role == 'admin' %}status-danger{% else %}status-info{% endif %}" style="font-weight: 700; font-size: 0.95rem; text-transform: uppercase;">
                        {{ info.role }}
                    </span>
                </li>
                {% endfor %}
            </ul>
        </div>

        <div class="card" style="text-align: center;">
            <a href="/" class="btn btn-secondary" style="width: 100%; margin: 0;">🏠 Return to Main Portal</a>
        </div>
    </div>

    <script>
        document.getElementById('show_password_toggle').addEventListener('change', function() {
            const pwd = document.getElementById('password');
            pwd.type = this.checked ? 'text' : 'password';
        });
    </script>
</body>
</html>
