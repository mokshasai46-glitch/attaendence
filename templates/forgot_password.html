<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credential Recovery - Security Reset</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container" style="max-width: 550px;">
        <header>
            <h1>Forgot Password</h1>
            <p>Reset and synchronize account credentials</p>
        </header>

        <div class="card">
            <h2>🔑 Reset Password</h2>
            <form action="/forgot_password" method="post">
                <div class="form-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" placeholder="Enter username..." required>
                </div>
                
                <div class="form-group">
                    <label for="new_password">New Password:</label>
                    <input type="password" id="new_password" name="new_password" placeholder="Enter new password..." required>
                </div>
                
                <div class="form-group" style="display: flex; align-items: center; justify-content: flex-start;">
                    <input type="checkbox" id="show_password_toggle">
                    <label for="show_password_toggle" style="margin-bottom: 0; cursor: pointer; user-select: none;">Show password</label>
                </div>
                
                <div class="form-group" style="display:none; margin-top: 20px;" id="master_key_group">
                    <label for="master_key" class="status-warning">Master Key (required for resets):</label>
                    <input type="password" id="master_key" name="master_key" placeholder="Enter admin master key...">
                </div>
                
                {% if error %}
                <div class="status-danger" style="background: rgba(220, 38, 38, 0.05); padding: 12px 18px; border-radius: 12px; margin: 20px 0; border: 1.5px solid rgba(220, 38, 38, 0.15); border-left: 4px solid var(--accent-red); font-size: 0.95rem;">
                    ❌ {{ error }}
                </div>
                {% endif %}
                
                <p style="font-size: 0.9rem; color: #475569; margin: 20px 0; line-height: 1.6;">
                    💡 Operator warning: Resyncing password requires you to provide the <strong>master key</strong> (Default key: <code>RESET123</code>).
                </p>
                
                <button type="submit" class="btn" style="width: 100%; margin: 10px 0 0 0;">🔄 Reset Credentials</button>
            </form>

            <div style="margin-top: 25px; text-align: center;">
                <a href="/login" class="btn btn-secondary" style="width: 100%; margin: 0;">🔙 Back to Login Gate</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('show_password_toggle').addEventListener('change', function() {
            const pwd = document.getElementById('new_password');
            pwd.type = this.checked ? 'text' : 'password';
        });
        
        const usernameInput = document.getElementById('username');
        usernameInput.addEventListener('input', function() {
            const group = document.getElementById('master_key_group');
            group.style.display = this.value.toLowerCase() === 'admin' ? 'block' : 'none';
        });
    </script>
</body>
</html>
