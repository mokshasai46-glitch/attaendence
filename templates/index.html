<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Recognition Attendance Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Attendance Management System</h1>
            <p>Smart Biometric Access Portal</p>
            <div class="status-warning" style="background: rgba(217, 119, 6, 0.05); padding: 12px 20px; border-radius: 12px; margin-top: 15px; border: 1px solid rgba(217, 119, 6, 0.15); border-left: 4px solid var(--accent-amber); display: inline-block; font-size: 0.95rem; font-weight: 500;">
                ⚠️ Note: Not enrolled? Please contact your administrator or faculty member.
            </div>
        </header>

        <!-- Quick Actions -->
        <div class="card">
            <h2>🚀 Quick Actions</h2>
            <div class="quick-actions">
                <a href="/login" class="btn">🔐 Faculty Login</a>
                <a href="/view_attendance" class="btn">📊 View Records</a>
                {% if session.role == 'admin' %}
                    <a href="/manage_users" class="btn">🛠 Manage Users</a>
                {% endif %}
            </div>
        </div>

        <!-- Attendance Form -->
        <div class="card">
            <h2>📸 Mark Attendance</h2>
            
            <div class="form-group">
                <label for="session_id">Session ID:</label>
                <input type="text" id="session_id" placeholder="Enter session ID..." required>
            </div>
            
            <div class="form-group">
                <label for="student_id">Student ID:</label>
                <div style="display: flex; gap: 12px; align-items: stretch; flex-wrap: wrap;">
                    <input type="text" id="student_id" placeholder="Enter Student ID..." required style="flex: 1; min-width: 200px;">
                    <button id="check-enrolled-btn" class="btn" style="margin: 0; min-width: 180px;">Check Status</button>
                </div>
            </div>
            
            <div class="form-group" style="text-align: center;">
                <div class="cyber-hud-container">
                    <div class="laser-scanner"></div>
                    <video id="video" width="320" height="240" autoplay></video>
                    <canvas id="preview-canvas" width="320" height="240" style="cursor: pointer;"></canvas>
                </div>
                
                <canvas id="canvas" width="320" height="240" style="display:none;"></canvas>
                
                <div id="liveness-prompt" style="display: none; margin: 15px 0;"></div>
                
                <div id="face-status" style="display: none; max-width: 320px; margin: 15px auto;">
                    <div id="face-indicator" style="font-weight: 700; font-size: 1.05em;"></div>
                </div>
            </div>
            
            <div style="text-align: center; margin-top: 15px;">
                <button id="start-capture-btn" class="btn" style="width: 100%; max-width: 320px;">🔒 Start Verification</button>
                <button id="capture-btn" class="btn" style="display:none; width: 100%; max-width: 320px;">📷 Capture Now</button>
            </div>
            
            <div id="result" style="display: none; max-width: 450px; margin: 25px auto;"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/face-api.min.js"></script>
    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const previewCanvas = document.getElementById('preview-canvas');
        const startCaptureBtn = document.getElementById('start-capture-btn');
        const captureBtn = document.getElementById('capture-btn');
        const resultDiv = document.getElementById('result');
        const livenessPrompt = document.getElementById('liveness-prompt');
        const checkEnrolledBtn = document.getElementById('check-enrolled-btn');
        const faceStatusDiv = document.getElementById('face-status');
        const faceIndicatorDiv = document.getElementById('face-indicator');
        
        let stream = null;
        let isCapturing = false;
        let faceDetectionInterval = null;
        let modelsLoaded = false;

        async function loadModels() {
            try {
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri('/static/models'),
                    faceapi.nets.faceLandmark68Net.loadFromUri('/static/models'),
                    faceapi.nets.faceRecognitionNet.loadFromUri('/static/models')
                ]);
                modelsLoaded = true;
                console.log('Face detection models loaded');
            } catch (err) {
                console.error('Error loading models:', err);
            }
        }

        // Draw soft, smooth rounded rectangular tracking boundaries on face
        function drawFaceBox(faceLocation, state = 'white', confidence = null) {
            const ctx = previewCanvas.getContext('2d');
            ctx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
            
            if (!faceLocation) return;

            const top = faceLocation[0];
            const right = faceLocation[1];
            const bottom = faceLocation[2];
            const left = faceLocation[3];
            
            const width = right - left;
            const height = bottom - top;
            
            let boxColor, statusText, statusClass;
            switch(state) {
                case 'white':
                    boxColor = '#667eea'; // Soft Indigo Blue
                    statusText = '⏳ Aligning face...';
                    statusClass = 'status-info';
                    break;
                case 'yellow':
                    boxColor = '#d97706'; // Smooth Amber
                    statusText = '🔍 Processing scan...';
                    statusClass = 'status-warning';
                    break;
                case 'green':
                    boxColor = '#2e7d32'; // Forest Success Green
                    statusText = '✅ Verification Successful';
                    statusClass = 'status-success';
                    break;
                case 'red':
                    boxColor = '#dc2626'; // Safe Warning Red
                    statusText = '❌ Identity Match Failed';
                    statusClass = 'status-danger';
                    break;
                default:
                    boxColor = '#667eea';
                    statusText = '⏳ Aligning face...';
                    statusClass = 'status-info';
            }
            
            // Helper to draw soft rounded rectangle
            function drawRoundedRect(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                ctx.beginPath();
                ctx.moveTo(x + r, y);
                ctx.arcTo(x + w, y, x + w, y + h, r);
                ctx.arcTo(x + w, y + h, x, y + h, r);
                ctx.arcTo(x, y + h, x, y, r);
                ctx.arcTo(x, y, x + w, y, r);
                ctx.closePath();
                ctx.stroke();
            }

            // Draw thin inner boundary
            ctx.strokeStyle = boxColor + '33'; // 20% opacity
            ctx.lineWidth = 1;
            drawRoundedRect(left, top, width, height, 12);
            
            // Draw clean main track boundary
            ctx.strokeStyle = boxColor;
            ctx.lineWidth = 3;
            ctx.lineJoin = 'round';
            drawRoundedRect(left, top, width, height, 12);
            
            // Update HUD text status
            faceStatusDiv.style.display = 'block';
            faceIndicatorDiv.className = statusClass;
            faceIndicatorDiv.textContent = statusText + (confidence ? ` (${(confidence * 100).toFixed(1)}%)` : '');
        }

        async function detectFaceInVideo() {
            if (!modelsLoaded || !stream || isCapturing) {
                if (faceDetectionInterval) {
                    faceDetectionInterval = setTimeout(detectFaceInVideo, 500);
                }
                return;
            }

            try {
                const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions());
                if (detection) {
                    const box = detection.detection.box;
                    drawFaceBox([box.top, box.right, box.bottom, box.left], 'white');
                } else {
                    const ctx = previewCanvas.getContext('2d');
                    ctx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
                    faceStatusDiv.style.display = 'none';
                }
            } catch (err) {
                console.error('Face detection error:', err);
            }

            if (faceDetectionInterval !== null) {
                faceDetectionInterval = setTimeout(detectFaceInVideo, 500);
            }
        }

        function startFaceDetection() {
            if (faceDetectionInterval !== null) return;
            faceDetectionInterval = setTimeout(detectFaceInVideo, 500);
        }

        function stopFaceDetection() {
            if (faceDetectionInterval !== null) {
                clearTimeout(faceDetectionInterval);
                faceDetectionInterval = null;
            }
        }

        checkEnrolledBtn.addEventListener('click', () => {
            const studentId = document.getElementById('student_id').value.trim();
            if (!studentId) {
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = '<p class="status-danger">❌ Please enter Student ID first.</p>';
                return;
            }

            fetch(`/check_student/${studentId}`)
                .then(response => response.json())
                .then(data => {
                    resultDiv.style.display = 'block';
                    if (data.exists) {
                        resultDiv.innerHTML = `<p class="status-success">✓ Student ID "${studentId}" is enrolled in the system databases.</p>`;
                    } else {
                        resultDiv.innerHTML = `<p class="status-warning">⚠️ Student ID "${studentId}" is not enrolled. Contact faculty overrides.</p>`;
                    }
                })
                .catch(err => {
                    console.error(err);
                    resultDiv.style.display = 'block';
                    resultDiv.innerHTML = '<p class="status-danger">❌ System database search timed out.</p>';
                });
        });
        
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(mediaStream => {
                stream = mediaStream;
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    startFaceDetection();
                };
            })
            .catch(err => {
                console.error('Error accessing webcam:', err);
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = '<p class="status-danger">❌ Webcam connection failed. Please grant permission access.</p>';
            });

        window.addEventListener('load', loadModels);

        startCaptureBtn.addEventListener('click', () => {
            const sessionId = document.getElementById('session_id').value;
            const studentId = document.getElementById('student_id').value;
            if (!sessionId) {
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = '<p class="status-danger">❌ Please enter Session ID.</p>';
                return;
            }
            if (!studentId) {
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = '<p class="status-danger">❌ Please enter Student ID.</p>';
                return;
            }

            resultDiv.style.display = 'none';
            resultDiv.innerHTML = '';
            faceStatusDiv.style.display = 'none';
            previewCanvas.getContext('2d').clearRect(0, 0, previewCanvas.width, previewCanvas.height);

            const actions = ['smile', 'blink your eyes', 'look left and right', 'nod your head'];
            const randomAction = actions[Math.floor(Math.random() * actions.length)];

            livenessPrompt.style.display = 'block';
            livenessPrompt.textContent = `🔒 Security Check: Please ${randomAction} inside the scanner, then click "Capture Now"`;
            startCaptureBtn.style.display = 'none';
            captureBtn.style.display = 'inline-block';

            setTimeout(() => {
                if (livenessPrompt.textContent.includes('Security Check')) {
                    livenessPrompt.style.display = 'none';
                    livenessPrompt.textContent = '';
                    startCaptureBtn.style.display = 'inline-block';
                    captureBtn.style.display = 'none';
                }
            }, 10000);
        });

        captureBtn.addEventListener('click', () => {
            if (isCapturing) return;
            isCapturing = true;
            stopFaceDetection();
            
            const sessionId = document.getElementById('session_id').value;
            const studentId = document.getElementById('student_id').value;

            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, 320, 240);
            
            canvas.toBlob(blob => {
                const formData = new FormData();
                formData.append('session_id', sessionId);
                formData.append('student_id', studentId);
                formData.append('image', blob, 'capture.jpg');

                resultDiv.style.display = 'block';
                resultDiv.innerHTML = '<p class="status-info">🔍 Aligning vectors... Accessing registry profile.</p>';
                
                // Draw yellow scanning state box
                drawFaceBox([40, 280, 200, 40], 'yellow');

                fetch('/attendance', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if (data.face_location) {
                        const resultState = data.match ? 'green' : 'red';
                        drawFaceBox(data.face_location, resultState, data.confidence || null);
                    }
                    
                    livenessPrompt.style.display = 'none';
                    livenessPrompt.textContent = '';
                    startCaptureBtn.style.display = 'inline-block';
                    captureBtn.style.display = 'none';
                    isCapturing = false;

                    if (data.status === 'logged') {
                        resultDiv.innerHTML = `<p class="status-success">✓ Attendance logged successfully. Student: ${data.student_id} (Confidence: ${Math.round(data.confidence * 100)}%)</p>`;
                    } else if (data.status === 'not_enrolled') {
                        resultDiv.innerHTML = `<p class="status-warning">⚠️ Profile mapping failure: ${data.message}</p>`;
                    } else if (data.status === 'not_recognized') {
                        resultDiv.innerHTML = `<p class="status-danger">❌ Authorization Denied: Profile reference match not found.</p>`;
                    } else if (data.status === 'security_failed') {
                        resultDiv.innerHTML = `<p class="status-danger">🚫 Security validation failed: ${data.message}</p>`;
                    } else if (data.status === 'low_confidence') {
                        resultDiv.innerHTML = `<p class="status-warning">⚠️ Vector confidence threshold alert: ${data.message}</p>`;
                    } else {
                        resultDiv.innerHTML = `<p class="status-danger">❌ Transmission error: ${data.error}</p>`;
                    }
                    
                    setTimeout(() => {
                        startFaceDetection();
                    }, 4000);
                })
                .catch(err => {
                    console.error('Error:', err);
                    resultDiv.innerHTML = '<p class="status-danger">❌ Network sync interrupted. Please try again.</p>';
                    livenessPrompt.style.display = 'none';
                    livenessPrompt.textContent = '';
                    startCaptureBtn.style.display = 'inline-block';
                    captureBtn.style.display = 'none';
                    isCapturing = false;
                    startFaceDetection();
                });
            }, 'image/jpeg');
        });
    </script>
</body>
</html>
